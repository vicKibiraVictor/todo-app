# Secret for DB credentials
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: todo-app
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: tododb

---
# PersistentVolumeClaim for Postgres data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: todo-app
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# Postgres Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: todo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # ── startupProbe ────────────────────────────────────────────────
          # Gives postgres up to 60s to initialise on first boot
          # (runs BEFORE readiness/liveness kick in)
          # failureThreshold * periodSeconds = 30 * 2 = 60s max
          startupProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "tododb"]
            initialDelaySeconds: 5
            periodSeconds: 2
            failureThreshold: 30
            timeoutSeconds: 1

          # ── readinessProbe ───────────────────────────────────────────────
          # Removes pod from Service endpoints if postgres can't accept connections.
          # Backend pods will not receive traffic until this passes.
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "tododb"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 2

          # ── livenessProbe ────────────────────────────────────────────────
          # Restarts the container if postgres stops accepting connections
          # entirely (e.g. deadlock / OOM). Longer period so it doesn't
          # restart a healthy-but-busy DB unnecessarily.
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "tododb"]
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 3

      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: postgres-pvc

---
# Postgres Service (ClusterIP - internal only)
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: todo-app
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432