# ─────────────────────────────────────────────────────
#  OpenSearch values
#  Single-node setup for Minikube / Codespaces
# ─────────────────────────────────────────────────────

singleNode: true
replicas: 1

config:
  opensearch.yml: |
    cluster.name: taskflow-logs
    network.host: 0.0.0.0
    plugins.security.disabled: true

resources:
  requests:
    cpu: 300m
    memory: 1Gi
  limits:
    cpu: 1000m
    memory: 2Gi

# Proper JVM config (DO NOT duplicate in extraEnvs)
opensearchJavaOpts: "-Xms512m -Xmx512m"

extraEnvs:
  - name: DISABLE_SECURITY_PLUGIN
    value: "true"
  - name: DISABLE_INSTALL_DEMO_CONFIG
    value: "true"

persistence:
  enabled: true
  size: 5Gi

sysctlInit:
  enabled: true

startupProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 30

readinessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 10