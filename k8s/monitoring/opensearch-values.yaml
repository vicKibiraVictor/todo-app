singleNode: true
replicas: 1

clusterName: taskflow-logs

# Disable security completely for local dev
config:
  opensearch.yml: |
    cluster.name: taskflow-logs
    network.host: 0.0.0.0
    discovery.type: single-node
    plugins.security.disabled: true

# Much lighter resources for Codespaces
resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

# Smaller JVM heap
opensearchJavaOpts: "-Xms256m -Xmx256m"

extraEnvs:
  - name: DISABLE_INSTALL_DEMO_CONFIG
    value: "true"

# Disable persistence for local dev
persistence:
  enabled: false

# Required on Linux
sysctlInit:
  enabled: true

# Extra startup time
startupProbe:
  initialDelaySeconds: 60
  periodSeconds: 15
  failureThreshold: 40

readinessProbe:
  initialDelaySeconds: 60
  periodSeconds: 15
  failureThreshold: 20