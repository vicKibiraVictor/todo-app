apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-custom-dashboards
  namespace: monitoring
  labels:
    grafana_dashboard: "1"   # picked up by Grafana sidecar automatically
data:
  taskflow-cluster.json: |
    {
      "title": "Taskflow — Cluster Overview",
      "uid": "taskflow-cluster",
      "tags": ["taskflow", "kubernetes"],
      "timezone": "browser",
      "schemaVersion": 38,
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "title": "CPU Usage — All Pods",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "targets": [{
            "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=~'todo-app|monitoring|logging', container!=''}[5m])) by (namespace, pod)",
            "legendFormat": "{{namespace}} / {{pod}}"
          }],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "color": { "mode": "palette-classic" }
            }
          }
        },
        {
          "id": 2,
          "title": "Memory Usage — All Pods",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "targets": [{
            "expr": "sum(container_memory_working_set_bytes{namespace=~'todo-app|monitoring|logging', container!=''}) by (namespace, pod)",
            "legendFormat": "{{namespace}} / {{pod}}"
          }],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "color": { "mode": "palette-classic" }
            }
          }
        },
        {
          "id": 3,
          "title": "Pod Status",
          "type": "stat",
          "gridPos": { "x": 0, "y": 8, "w": 6, "h": 4 },
          "targets": [{
            "expr": "count(kube_pod_status_phase{phase='Running', namespace=~'todo-app|monitoring|logging'})",
            "legendFormat": "Running"
          }],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "green" },
              "mappings": [],
              "thresholds": { "steps": [{ "color": "green", "value": null }] }
            }
          }
        },
        {
          "id": 4,
          "title": "Pods Not Running",
          "type": "stat",
          "gridPos": { "x": 6, "y": 8, "w": 6, "h": 4 },
          "targets": [{
            "expr": "count(kube_pod_status_phase{phase!='Running', namespace=~'todo-app|monitoring|logging'}) or vector(0)",
            "legendFormat": "Not Running"
          }],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            }
          }
        },
        {
          "id": 5,
          "title": "Node CPU Capacity Used %",
          "type": "gauge",
          "gridPos": { "x": 12, "y": 8, "w": 6, "h": 4 },
          "targets": [{
            "expr": "100 * (1 - avg(rate(node_cpu_seconds_total{mode='idle'}[5m])))",
            "legendFormat": "CPU %"
          }],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0, "max": 100,
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              }
            }
          }
        },
        {
          "id": 6,
          "title": "Node Memory Used %",
          "type": "gauge",
          "gridPos": { "x": 18, "y": 8, "w": 6, "h": 4 },
          "targets": [{
            "expr": "100 * (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes))",
            "legendFormat": "Memory %"
          }],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0, "max": 100,
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 75 },
                  { "color": "red", "value": 90 }
                ]
              }
            }
          }
        },
        {
          "id": 7,
          "title": "Container Restarts (last 1h)",
          "type": "table",
          "gridPos": { "x": 0, "y": 12, "w": 24, "h": 6 },
          "targets": [{
            "expr": "increase(kube_pod_container_status_restarts_total{namespace=~'todo-app|monitoring|logging'}[1h]) > 0",
            "legendFormat": "{{namespace}} / {{pod}} / {{container}}",
            "instant": true
          }],
          "fieldConfig": {
            "defaults": { "unit": "short" }
          }
        }
      ]
    }

  # ── FUTURE: app metrics dashboard (uncomment when backend exposes /metrics) ──
  # taskflow-app.json: |
  #   { ... }
  #
  # ── FUTURE: postgres dashboard (uncomment when postgres-exporter is enabled) ──
  # taskflow-postgres.json: |
  #   { ... }
