# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: todo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ahonakibira/todo-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

          # ── startupProbe ─────────────────────────────────────────────────
          # Gives nginx up to 20s to fully start before other probes run.
          # failureThreshold * periodSeconds = 10 * 2 = 20s max
          startupProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 2
            failureThreshold: 10
            timeoutSeconds: 2

          # ── readinessProbe ───────────────────────────────────────────────
          # Removes pod from Service if nginx stops serving.
          # Checks that the React app index.html is actually being served.
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 3

          # ── livenessProbe ────────────────────────────────────────────────
          # Restarts the container if nginx becomes completely unresponsive.
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 5

---
# Frontend Service (NodePort - accessible from browser)
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: todo-app
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080